{% extends 'enroll/base.html' %}


{% block body %}

<div class="page">
    <div class="header">
        <div class="header-icon">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="3" width="7" height="7" rx="1" />
                <rect x="14" y="3" width="7" height="7" rx="1" />
                <rect x="3" y="14" width="7" height="7" rx="1" />
                <rect x="14" y="14" width="7" height="7" rx="1" />
            </svg>
        </div>
        <div>
            <h1>Contact Manager</h1>
            <p>Add, edit and manage your contacts</p>
        </div>
    </div>

    <div class="layout">
        <div class="card" id="formCard">
            <div class="form-group">
                <label for="fname">Full name</label>
                <input type="text" id="fname" placeholder="e.g. Arjun Sharma" autocomplete="off" />
            </div>
            <div class="form-group">
                <label for="fage">Age</label>
                <input type="number" id="fage" placeholder="e.g. 28" min="1" max="120" />
            </div>
            <div class="form-group">
                <label for="fphone">Phone number</label>
                <input type="tel" id="fphone" placeholder="e.g. +91 98765 43210" />
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="submitForm()" id="submitBtn">Add contact</button>
                <button class="btn btn-reset" onclick="resetForm()">Clear</button>
            </div>
        </div>

        <div class="card">
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Phone</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>Arjun Sharma</td>
                            <td>28</td>
                            <td>+91 98765 43210</td>
                            <td>
                                <div class="actions">
                                    <button class="act-btn act-edit">Edit</button>
                                    <button class="act-btn act-del">Delete</button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>Priya Verma</td>
                            <td>34</td>
                            <td>+91 91234 56789</td>
                            <td>
                                <div class="actions">
                                    <button class="act-btn act-edit">Edit</button>
                                    <button class="act-btn act-del">Delete</button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td>3</td>
                            <td>Rahul Gupta</td>
                            <td>22</td>
                            <td>+91 87654 32109</td>
                            <td>
                                <div class="actions">
                                    <button class="act-btn act-edit">Edit</button>
                                    <button class="act-btn act-del">Delete</button>
                                </div>
                            </td>
                        </tr>
                    </tbody>

                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>


{% endblock body %}
